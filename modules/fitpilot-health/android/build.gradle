plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.fitpilothealth'
version = '1.0.0'

android {
  namespace "expo.modules.fitpilothealth"
  defaultConfig {
    versionCode 1
    versionName "1.0.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation "androidx.health.connect:connect-client:1.1.0"
  implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1"
}
